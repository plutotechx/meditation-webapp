<script>
  // =========================
  // Week header (local)
  // =========================
  const weekHeaderEl = document.getElementById("weekHeader");
  function pad2(n){ return String(n).padStart(2,"0"); }
  function toISODateLocal(d){ return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`; }
  function thaiDateLabelLocal(d){
    return d.toLocaleDateString("th-TH", { day:"numeric", month:"short", year:"2-digit" });
  }
  function mondayOfWeekLocal(d){
    const x = new Date(d);
    x.setHours(0,0,0,0);
    const day = x.getDay(); // Sun=0
    const diff = (day === 0) ? -6 : (1 - day);
    x.setDate(x.getDate() + diff);
    return x;
  }
  function sundayOfWeekFromMonday(mon){
    const sun = new Date(mon);
    sun.setDate(mon.getDate() + 6);
    sun.setHours(0,0,0,0);
    return sun;
  }
  (function showWeekHeader(){
    const now = new Date();
    const mon = mondayOfWeekLocal(now);
    const sun = sundayOfWeekFromMonday(mon);
    weekHeaderEl.textContent = `จันทร์ ${thaiDateLabelLocal(mon)} – อาทิตย์ ${thaiDateLabelLocal(sun)}`;
  })();

  // =========================
  // LogDate dropdown (Mon..Sun of this week) + no past/future select
  // =========================
  const logDateEl = document.getElementById("logDate");
  const weekdayHiddenEl = document.getElementById("weekdayHidden");
  const TH_DOW = ["อาทิตย์","จันทร์","อังคาร","พุธ","พฤหัส","ศุกร์","เสาร์"];

  function buildLogDateOptions7DaysNoPast(){
    const now = new Date();
    const todayISO = toISODateLocal(now);
    const monThis = mondayOfWeekLocal(now);

    const days = [];
    for (let i=0; i<7; i++){
      const d = new Date(monThis);
      d.setDate(monThis.getDate() + i);
      d.setHours(0,0,0,0);
      days.push(d);
    }

    logDateEl.innerHTML = "";
    for (const d of days){
      const iso = toISODateLocal(d);
      const dow = TH_DOW[d.getDay()];
      const base = `${dow} ${thaiDateLabelLocal(d)}`;
      const label = (iso === todayISO) ? `${base} (วันนี้)` : base;

      const opt = document.createElement("option");
      opt.value = iso;
      opt.textContent = label;
      opt.dataset.dow = dow;

      if (iso < todayISO){
        opt.disabled = true;
        opt.textContent = `${label} (ผ่านมาแล้ว)`;
      } else if (iso > todayISO){
        opt.disabled = true;
        opt.textContent = `${label} (ยังมาไม่ถึง)`;
      }
      logDateEl.appendChild(opt);
    }

    if ([...logDateEl.options].some(o => o.value === todayISO)){
      logDateEl.value = todayISO;
    } else {
      for (let i=0; i<logDateEl.options.length; i++){
        if (!logDateEl.options[i].disabled){
          logDateEl.selectedIndex = i;
          break;
        }
      }
    }

    weekdayHiddenEl.value = logDateEl.selectedOptions[0]?.dataset?.dow || "";
  }
  logDateEl.addEventListener("change", () => {
    const sel = logDateEl.selectedOptions[0];
    weekdayHiddenEl.value = sel?.dataset?.dow || "";
  });
  buildLogDateOptions7DaysNoPast();

  // =========================
  // Popup logic (instant "saving..." -> success -> autoclose)
  // =========================
  const overlay = document.getElementById('successOverlay');
  const textEl  = document.getElementById('successText');
  const closeBtn = document.getElementById('successClose');

  // Timing per your requirement
  const HOLD_SUCCESS_MS = 6000; // ค้างหลัง success 6 วิ
  const RELOAD_AFTER_CLOSE_MS = 2000; // ปิดแล้วค่อยรอ 2 วิแล้ว reload

  let overlayTimer = null;
  let pendingReloadTimer = null;

  function openOverlay(){
    overlay.classList.add('is-open');
    overlay.setAttribute('aria-hidden', 'false');
  }
  function closeOverlay(){
    overlay.classList.remove('is-open');
    overlay.setAttribute('aria-hidden', 'true');
  }
  function clearTimers(){
    if (overlayTimer){ clearTimeout(overlayTimer); overlayTimer=null; }
    if (pendingReloadTimer){ clearTimeout(pendingReloadTimer); pendingReloadTimer=null; }
  }

  function showAfterSaveGrid(){
    const grid = document.getElementById("afterSaveGrid");
    if (grid) grid.hidden = false;
  }
  function hideAfterSaveGrid(){
    const grid = document.getElementById("afterSaveGrid");
    if (grid) grid.hidden = true;
  }

  // “กำลังบันทึก…” ขึ้นทันที (ไม่รอ backend)
  function showSavingPopup(){
    clearTimers();
    hideAfterSaveGrid();
    textEl.textContent = "กำลังบันทึกข้อมูล...";
    openOverlay();
    // ไม่ตั้ง autoclose ตอน saving — รอผลจาก backend ก่อน
  }

  // “สำเร็จ + กล่อง” แล้วค้าง 6 วิ ปิดเอง
  function showSuccessPopup(){
    clearTimers();
    textEl.textContent = "บันทึกข้อมูลเรียบร้อย";
    showAfterSaveGrid();
    openOverlay();

    overlayTimer = setTimeout(() => {
      closeOverlay();
      // ปิดแล้วรอ 2 วิค่อย reload
      pendingReloadTimer = setTimeout(() => location.reload(), RELOAD_AFTER_CLOSE_MS);
    }, HOLD_SUCCESS_MS);
  }

  // error: แสดงข้อความแล้วให้ผู้ใช้ปิดเอง (หรือจะ auto close 3 วิได้)
  function showErrorPopup(msg){
    clearTimers();
    hideAfterSaveGrid();
    textEl.textContent = msg || "บันทึกไม่สำเร็จ";
    openOverlay();
    // ไม่ auto reload ตอน error
  }

  if (closeBtn){
    closeBtn.addEventListener('click', () => {
      clearTimers();
      closeOverlay();
    });
  }
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
      clearTimers();
      closeOverlay();
    }
  });

  // =========================
  // After-save marks (no time)
  // =========================
  function markSVG(done){
    if (done){
      return `<span class="mark ok" aria-label="ทำแล้ว">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M20 7L10.5 16.5L4 10" stroke="#b9ffd5" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </span>`;
    }
    return `<span class="mark no" aria-label="ยังไม่ทำ">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M18 6L6 18M6 6l12 12" stroke="#ffd1d1" stroke-width="3" stroke-linecap="round"/>
      </svg>
    </span>`;
  }

  function renderAfterSaveBoxes(st){
    // st = { doneCount, sessions:{s1:{done},s2:{done},s3:{done}} }
    const setBox = (key, done) => {
      const box = document.getElementById("box" + key.toUpperCase());
      const icon = document.getElementById("icon" + key.toUpperCase());
      const slot = document.getElementById("mark" + key.toUpperCase());
      if (!box || !icon || !slot) return;

      const clsOk = done ? "ok" : "no";
      box.classList.remove("ok","no");
      box.classList.add(clsOk);

      icon.textContent = done ? "✓" : "✕";
      slot.innerHTML = markSVG(done);
    };

    setBox("s1", !!st.sessions.s1.done);
    setBox("s2", !!st.sessions.s2.done);
    setBox("s3", !!st.sessions.s3.done);

    const sumEl = document.getElementById("sumText");
    if (sumEl) sumEl.textContent = `${st.doneCount}/3`;
  }

  // Normalize status payload from various shapes
  function normalizeStatusPayload(raw){
    const empty = { doneCount:0, sessions:{ s1:{done:false}, s2:{done:false}, s3:{done:false} } };
    if (!raw) return empty;

    // Already: {doneCount, sessions:{s1:{done}}}
    if (raw.sessions && raw.sessions.s1 && typeof raw.sessions.s1 === "object" && ("done" in raw.sessions.s1)){
      const s = raw.sessions;
      const dc = (raw.doneCount != null) ? raw.doneCount : [s.s1.done,s.s2.done,s.s3.done].filter(Boolean).length;
      return { doneCount: dc, sessions:{ s1:{done:!!s.s1.done}, s2:{done:!!s.s2.done}, s3:{done:!!s.s3.done} } };
    }

    // GAS checkStatus: sessions:{s1:{mark:"✅"}}
    if (raw.sessions && raw.sessions.s1 && typeof raw.sessions.s1 === "object" && ("mark" in raw.sessions.s1)){
      const s = raw.sessions;
      const toDone = (x)=> String((x && x.mark) || "") === "✅";
      const ss = { s1:{done:toDone(s.s1)}, s2:{done:toDone(s.s2)}, s3:{done:toDone(s.s3)} };
      const dc = (raw.doneCount != null) ? raw.doneCount : [ss.s1.done,ss.s2.done,ss.s3.done].filter(Boolean).length;
      return { doneCount: dc, sessions: ss };
    }

    // Legacy: sessions:{s1:"✅"}
    if (raw.sessions && typeof raw.sessions.s1 === "string"){
      const toDone = (v)=> String(v||"") === "✅";
      const ss = { s1:{done:toDone(raw.sessions.s1)}, s2:{done:toDone(raw.sessions.s2)}, s3:{done:toDone(raw.sessions.s3)} };
      const dc = (raw.doneCount != null) ? raw.doneCount : [ss.s1.done,ss.s2.done,ss.s3.done].filter(Boolean).length;
      return { doneCount: dc, sessions: ss };
    }

    return empty;
  }

  async function fetchCheckStatus(name, logDate){
    const url = `/api/checkStatus?name=${encodeURIComponent(name)}&logDate=${encodeURIComponent(logDate)}`;
    const res = await fetch(url, { cache:"no-store" });
    const out = await res.json().catch(()=>({}));
    if (!res.ok || !out.ok) throw new Error(out.error || "checkStatus_failed");
    return normalizeStatusPayload(out);
  }

  // =========================
  // SUBMIT
  // =========================
  const form = document.getElementById("f");
  const btn  = document.getElementById("btn");
  const msg  = document.getElementById("msg");

  form.addEventListener("submit", async (ev) => {
    ev.preventDefault();

    btn.disabled = true;
    msg.className = "msg";
    msg.textContent = "กำลังบันทึกข้อมูล...";

    const fd = new FormData(form);
    const payload = Object.fromEntries(fd.entries());

    // audit
    payload.clientNow = new Date().toISOString();
    payload.tzOffsetMin = new Date().getTimezoneOffset();

    // ✅ popup “กำลังบันทึก…” ทันที (ไม่รอ backend)
    showSavingPopup();

    try {
      const res = await fetch("/api/submit", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify(payload),
      });

      const out = await res.json().catch(() => ({}));

      if (res.ok && out.ok) {
        msg.className = "msg ok";
        msg.textContent = "บันทึกข้อมูลเรียบร้อย ✅";

        // ✅ ดึงสถานะ: prefer out.status (เร็วกว่า) ถ้าไม่มีค่อยยิง checkStatus
        let st = null;
        try{
          if (out && out.status) st = normalizeStatusPayload(out.status);
          else st = await fetchCheckStatus(payload.name, payload.logDate);
        } catch(e){
          st = { doneCount:0, sessions:{ s1:{done:false}, s2:{done:false}, s3:{done:false} } };
        }

        // ใส่กล่องครั้งที่ 1/2/3 + สรุป
        renderAfterSaveBoxes(st);

        // ✅ เปลี่ยน popup เป็น success แล้วค้าง 6 วิ ปิดเอง + 2 วิ reload
        showSuccessPopup();

        // reset form + rebuild dates พร้อมไว้ใช้รอบถัดไป (reload จะมาทับอยู่แล้ว แต่ทำไว้ให้เนียน)
        form.reset();
        buildLogDateOptions7DaysNoPast();

      } else {
        msg.className = "msg bad";
        msg.textContent = "บันทึกไม่สำเร็จ ❌ " + (out.error || "unknown_error");
        showErrorPopup("บันทึกไม่สำเร็จ ❌ " + (out.error || "unknown_error"));
      }
    } catch (e) {
      msg.className = "msg bad";
      msg.textContent = "บันทึกไม่สำเร็จ ❌ " + e;
      showErrorPopup("บันทึกไม่สำเร็จ ❌ " + e);
    } finally {
      btn.disabled = false;
    }
  });
</script>
